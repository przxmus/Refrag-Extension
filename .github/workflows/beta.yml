name: Beta build

on:
  push:
    branches: [main, master]

permissions:
  contents: write

concurrency:
  group: beta-release
  cancel-in-progress: false

jobs:
  beta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run check
      - name: Package extension
        run: cd dist && zip -r ../refrag-plus-beta-${GITHUB_SHA::7}.zip .
      - name: Generate release notes from commits
        run: |
          PREVIOUS_TAG="$(git tag --list 'beta-*' --sort=-creatordate | head -n 1)"
          bun scripts/release-notes.ts "$PREVIOUS_TAG" "$GITHUB_SHA" > release-notes.md
      - name: Create beta release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "beta-${GITHUB_SHA::7}" "refrag-plus-beta-${GITHUB_SHA::7}.zip" --prerelease --notes-file release-notes.md --title "Beta ${GITHUB_SHA::7}" --target "$GITHUB_SHA"
