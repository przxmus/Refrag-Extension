name: Release build

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semantic version (for example 1.2.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        run: '[[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]] || { echo "Expected semantic version, got: $VERSION"; exit 1; }'
      - run: bun install --frozen-lockfile
      - run: bun run check
        env:
          EXTENSION_VERSION: ${{ inputs.version }}
      - name: Package extension
        env:
          VERSION: ${{ inputs.version }}
        run: cd dist && zip -r "../refrag-routine-shuffler-v${VERSION}.zip" .
      - name: Create release with generated notes
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: gh release create "v${VERSION}" "refrag-routine-shuffler-v${VERSION}.zip" --generate-notes --title "v${VERSION}" --target "$GITHUB_SHA"
