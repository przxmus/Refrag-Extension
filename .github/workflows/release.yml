name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Version increment
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - custom
      custom_version:
        description: Custom x.y.z version (used only when custom is selected)
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Calculate release version
        id: version
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
          CUSTOM_VERSION: ${{ inputs.custom_version }}
        run: |
          PREVIOUS_TAG="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
          CURRENT_VERSION="$PREVIOUS_TAG"
          if [ -z "$PREVIOUS_TAG" ]; then
            CURRENT_VERSION="$(bun -e 'console.log((await Bun.file("manifest.json").json()).version)')"
          fi
          VERSION="$(bun scripts/next-version.ts "$CURRENT_VERSION" "$RELEASE_TYPE" "$CUSTOM_VERSION")"
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Release v${VERSION} already exists."
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "previous_tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"
          echo "Releasing v${VERSION} from ${CURRENT_VERSION}."
      - name: Validate and build
        run: bun run check
        env:
          EXTENSION_VERSION: ${{ steps.version.outputs.version }}
      - name: Package extension
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: cd dist && zip -r "../refrag-plus-v${VERSION}.zip" .
      - name: Generate release notes from commits
        env:
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
        run: bun scripts/release-notes.ts "$PREVIOUS_TAG" "$GITHUB_SHA" > release-notes.md
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: gh release create "v${VERSION}" "refrag-plus-v${VERSION}.zip" --notes-file release-notes.md --title "v${VERSION}" --target "$GITHUB_SHA"
